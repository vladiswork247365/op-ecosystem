<style>
:root{--bg:#070708;--red:#E01029;--red-bright:#FF1F3D;--white:#F2F3F5;--muted:#6a6d75;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#070708 !important;font-family:'Montserrat',sans-serif;-webkit-font-smoothing:antialiased;position:fixed;width:100%;overscroll-behavior:none;touch-action:none;}
/* Гарантированная чёрная подложка — её невозможно осветлить blend-режимами в энергосбережении iOS */
#stage::before{content:"";position:absolute;inset:0;background:#070708;z-index:-1;pointer-events:none;}
#stage{position:fixed;inset:0;touch-action:none;-webkit-user-select:none;user-select:none;isolation:isolate;background:#070708;}
canvas{position:absolute;inset:0;display:block;touch-action:none;z-index:0;}
.nebula{position:absolute;inset:0;pointer-events:none;z-index:1;
background:
radial-gradient(50% 42% at 2% 0%, rgba(224,16,41,.85), rgba(94,8,19,.35) 30%, transparent 56%),
radial-gradient(46% 40% at 99% 100%, rgba(224,16,41,.78), rgba(94,8,19,.3) 32%, transparent 58%),
radial-gradient(30% 26% at 96% 4%, rgba(180,12,30,.4), transparent 50%),
radial-gradient(34% 32% at 4% 96%, rgba(140,10,24,.45), transparent 56%);
animation:breathe 16s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.78}50%{opacity:1}}
.smoke{position:absolute;inset:-30%;pointer-events:none;z-index:1;opacity:.5;
background:radial-gradient(38% 30% at 10% 8%, rgba(224,16,41,.25), transparent 60%),radial-gradient(34% 30% at 90% 92%, rgba(224,16,41,.22), transparent 60%);
filter:blur(20px);animation:drift 26s ease-in-out infinite alternate;}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(3%,-3%) scale(1.08)}}
.vignette{position:absolute;inset:0;pointer-events:none;z-index:2;background:radial-gradient(80% 80% at 50% 50%, transparent 34%, rgba(0,0,0,.7) 100%);}
.grain{display:none;}
.intro{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity 1.2s ease, visibility 1.2s;}
.intro.hide{opacity:0;visibility:hidden;pointer-events:none;}
.intro-core{width:14px;height:14px;border-radius:50%;background:var(--red-bright);box-shadow:0 0 40px 8px var(--red-bright);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(2.4);opacity:1}}
.hint{position:absolute;left:50%;bottom:34px;transform:translateX(-50%);z-index:5;color:var(--white);font-size:clamp(9px,2.6vw,12px);letter-spacing:.14em;white-space:nowrap;text-transform:uppercase;font-weight:600;opacity:0;animation:hintpulse 2.6s ease-in-out infinite, fadeIn 1s ease forwards 2.4s;text-align:center;}
@keyframes fadeIn{to{opacity:1}}
@keyframes hintpulse{0%,100%{opacity:.45}50%{opacity:.9}}
.brand{position:absolute;left:50%;top:20px;transform:translateX(-50%);z-index:5;display:flex;flex-direction:column;align-items:center;gap:7px;opacity:0;animation:bfade 1s ease forwards 2.1s;}
@keyframes bfade{to{opacity:1}}
.brand-ring{display:block;animation:brandspin 14s linear infinite;filter:drop-shadow(0 0 6px rgba(224,16,41,0.35));}
@keyframes brandspin{to{transform:rotate(360deg);}}
.brand-name{color:var(--white);font-weight:800;font-size:13px;letter-spacing:.24em;line-height:1;}
.brand b{color:var(--red-bright);}

/* кнопка-гамбургер */
.menu-btn{position:absolute;top:24px;left:26px;z-index:20;width:44px;height:44px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  background:rgba(20,8,12,0.35);border:1px solid rgba(255,80,100,0.18);border-radius:12px;
  cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  opacity:0;animation:bfade 1s ease forwards 2.2s;transition:border-color .25s,background .25s;}
.menu-btn:hover{border-color:rgba(255,80,100,0.5);background:rgba(40,12,18,0.5);}
.menu-btn span{display:block;width:20px;height:2px;border-radius:2px;background:var(--white);
  transition:transform .35s ease,opacity .25s ease;}
.menu-btn.open span:nth-child(1){transform:translateY(4px) rotate(45deg);}
.menu-btn.open span:nth-child(2){transform:translateY(-4px) rotate(-45deg);}

/* ===== Круглые кнопки соцсетей (WhatsApp / Telegram) ===== */
.social-top{position:absolute;top:24px;right:26px;z-index:20;display:flex;gap:10px;
  opacity:0;animation:bfade 1s ease forwards 2.2s;}
.social-btn{height:44px;border-radius:24px;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:0 14px 0 10px;
  background:rgba(20,8,12,0.35);border:1px solid rgba(255,80,100,0.18);cursor:pointer;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  text-decoration:none;
  transition:border-color .25s,background .25s,transform .2s;}
.social-btn:hover{border-color:rgba(255,80,100,0.5);background:rgba(40,12,18,0.5);transform:translateY(-1px);}
.social-btn svg{width:22px;height:22px;fill:var(--white);display:block;flex-shrink:0;}
.wa-label{color:var(--white);font-size:8.5px;font-weight:800;letter-spacing:.13em;line-height:1.3;text-align:left;white-space:nowrap;}
/* версия для шапки панели — чуть компактнее */
.social-panel{display:flex;gap:9px;align-items:center;}
.social-panel .social-btn{height:38px;padding:0 11px 0 8px;gap:7px;}
.social-panel .social-btn svg{width:18px;height:18px;}
.social-panel .wa-label{font-size:7.5px;}

/* затемнение за панелью (лёгкое, не перекрывает анимацию) */
.panel-overlay{position:absolute;inset:0;z-index:18;background:rgba(0,0,0,0);
  pointer-events:none;transition:background .4s ease;}
.panel-overlay.show{background:rgba(0,0,0,0.25);pointer-events:auto;}

/* стеклянная панель */
.panel{position:absolute;top:0;left:0;z-index:19;height:100%;
  width:min(33%,420px);min-width:300px;
  background:linear-gradient(135deg, rgba(26,9,13,0.78), rgba(9,5,7,0.72));
  backdrop-filter:blur(22px) saturate(120%);-webkit-backdrop-filter:blur(22px) saturate(120%);
  border-right:1px solid rgba(255,80,100,0.15);
  box-shadow:30px 0 80px rgba(0,0,0,0.5), inset -1px 0 0 rgba(255,255,255,0.04);
  transform:translateX(-105%);transition:transform .5s cubic-bezier(.7,0,.2,1);
  display:flex;flex-direction:column;padding:0 0 14px;overflow:hidden;}
.panel.open{transform:translateX(0);}
.panel-head{display:flex;align-items:center;justify-content:space-between;
  padding:0 22px 10px;margin-top:80px;border-bottom:1px solid rgba(255,80,100,0.1);flex-shrink:0;}
.panel-title{color:var(--white);font-weight:800;font-size:13px;letter-spacing:.16em;}
.panel-title b{color:var(--red-bright);}
.panel-close{background:none;border:none;color:var(--muted);font-size:26px;line-height:1;
  cursor:pointer;padding:0 4px;transition:color .2s;}
.panel-close:hover{color:var(--white);}
.panel-list{flex:1;min-height:0;overflow-y:auto;padding:12px 14px 18px;
  display:flex;flex-direction:column;justify-content:space-between;gap:6px;}
.panel-list::-webkit-scrollbar{width:4px;}
.panel-list::-webkit-scrollbar-thumb{background:rgba(255,80,100,0.25);border-radius:4px;}
.p-item{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:0 12px;border-radius:10px;flex:1;min-height:0;
  background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);
  transition:background .22s,border-color .22s,transform .22s;}
.p-item:hover{background:rgba(224,16,41,0.12);border-color:rgba(255,80,100,0.4);transform:translateX(3px);}
.p-name{color:var(--white);font-size:11px;font-weight:600;letter-spacing:.03em;
  text-transform:uppercase;line-height:1.25;}
.p-go{flex-shrink:0;display:inline-flex;align-items:center;gap:4px;
  padding:6px 11px;border-radius:8px;cursor:pointer;text-decoration:none;
  background:linear-gradient(135deg,#E01029,#8a0a1c);
  color:#fff;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  border:1px solid rgba(255,120,135,0.3);transition:filter .2s,transform .2s;white-space:nowrap;}
.p-go:hover{filter:brightness(1.18);transform:scale(1.04);}
.p-go svg{width:10px;height:10px;}
/* ===== Неактивные разделы (нет сайта) — аккуратно серые ===== */
.p-item.p-inactive{background:rgba(255,255,255,0.012);border-color:rgba(255,255,255,0.03);}
.p-item.p-inactive:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);transform:translateX(3px);}
.p-item.p-inactive .p-name{color:rgba(160,165,175,0.55);}
.p-go.p-soon{background:none;border:1px solid rgba(160,165,175,0.25);color:rgba(160,165,175,0.55);cursor:default;}
.p-go.p-soon:hover{filter:none;transform:none;}
</style>
</head>
<body>
<div id="stage">
<canvas id="c"></canvas>
<div class="smoke"></div><div class="nebula"></div><div class="vignette"></div><div class="grain"></div>
<div class="brand">

</div>

<!-- кнопка-гамбургер -->
<button id="menuBtn" class="menu-btn" aria-label="Меню">
  <span></span><span></span>
</button>

<!-- ===== Соцсети в правом верхнем углу (ССЫЛКИ: впишите href вместо '#') ===== -->
<div class="social-top">
  <a class="social-btn" id="waTop" href="#" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0012.04 2zm0 18.13h-.01c-1.52 0-3.01-.41-4.31-1.18l-.31-.18-3.2.84.85-3.12-.2-.32a8.2 8.2 0 01-1.26-4.36c0-4.54 3.7-8.23 8.25-8.23 2.2 0 4.27.86 5.82 2.42a8.18 8.18 0 012.41 5.82c0 4.54-3.7 8.49-8.25 8.49zm4.52-6.16c-.25-.12-1.47-.72-1.69-.81-.23-.08-.39-.12-.56.13-.16.25-.64.81-.79.97-.14.17-.29.19-.54.06-.25-.12-1.05-.39-1.99-1.23-.74-.66-1.23-1.47-1.38-1.72-.14-.25-.02-.38.11-.51.11-.11.25-.29.37-.43.12-.14.16-.25.25-.41.08-.17.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.41-.42-.56-.43-.14-.01-.31-.01-.48-.01-.17 0-.43.06-.66.31-.23.25-.86.85-.86 2.07 0 1.22.89 2.4 1.01 2.56.12.17 1.75 2.67 4.24 3.74.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.47-.6 1.67-1.18.21-.58.21-1.07.14-1.18-.06-.1-.22-.16-.47-.28z"/></svg><span class="wa-label">ОТДЕЛ<br>ПРОДАЖ</span>
  </a>
</div>

<!-- выезжающая панель со списком разделов -->
<aside id="panel" class="panel">
  <div class="panel-head">
    <span class="panel-title">ЭКОСИСТЕМА <b>ОП</b></span>
    <div class="social-panel">
      <a class="social-btn" id="waPanel" href="#" target="_blank" rel="noopener" aria-label="WhatsApp">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0012.04 2zm0 18.13h-.01c-1.52 0-3.01-.41-4.31-1.18l-.31-.18-3.2.84.85-3.12-.2-.32a8.2 8.2 0 01-1.26-4.36c0-4.54 3.7-8.23 8.25-8.23 2.2 0 4.27.86 5.82 2.42a8.18 8.18 0 012.41 5.82c0 4.54-3.7 8.49-8.25 8.49zm4.52-6.16c-.25-.12-1.47-.72-1.69-.81-.23-.08-.39-.12-.56.13-.16.25-.64.81-.79.97-.14.17-.29.19-.54.06-.25-.12-1.05-.39-1.99-1.23-.74-.66-1.23-1.47-1.38-1.72-.14-.25-.02-.38.11-.51.11-.11.25-.29.37-.43.12-.14.16-.25.25-.41.08-.17.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.41-.42-.56-.43-.14-.01-.31-.01-.48-.01-.17 0-.43.06-.66.31-.23.25-.86.85-.86 2.07 0 1.22.89 2.4 1.01 2.56.12.17 1.75 2.67 4.24 3.74.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.47-.6 1.67-1.18.21-.58.21-1.07.14-1.18-.06-.1-.22-.16-.47-.28z"/></svg><span class="wa-label">ОТДЕЛ<br>ПРОДАЖ</span>
      </a>
      <button id="panelClose" class="panel-close" aria-label="Закрыть">&times;</button>
    </div>
  </div>
  <div id="panelList" class="panel-list"></div>
</aside>
<div id="panelOverlay" class="panel-overlay"></div>
</div>
<div class="intro" id="intro"><div class="intro-core"></div></div>
<script>
// ===== СТОРОЖ (выполняется первым): страница не может застрять на заставке =====
// Скрываем интро по таймеру независимо ни от чего + ловим любые ошибки ниже
setTimeout(function(){var el=document.getElementById('intro');if(el)el.classList.add('hide');},1800);
window.addEventListener('error',function(){
  var el=document.getElementById('intro');if(el)el.classList.add('hide');
});
const canvas=document.getElementById('c');
const ctx=canvas?canvas.getContext('2d'):null;
// Сторож: страница не застревает на заставке, даже если что-то пойдёт не так
setTimeout(function(){var el=document.getElementById('intro');if(el)el.classList.add('hide');},1800);
window.addEventListener('error',function(){var el=document.getElementById('intro');if(el)el.classList.add('hide');});
// Глобальная защита canvas-вызовов от Safari/WebKit: гарантируем неотрицательные/конечные радиусы
if(ctx){
  const _fin=(v,d)=>(typeof v==='number'&&isFinite(v))?v:(d||0);
  const _pos=(v)=>{v=_fin(v,0);return v<0?0:v;};
  const _arc=ctx.arc.bind(ctx);
  ctx.arc=function(x,y,r,a,b,c){try{return _arc(_fin(x,0),_fin(y,0),_pos(r),_fin(a,0),_fin(b,0),c);}catch(e){}};
  if(ctx.ellipse){const _el=ctx.ellipse.bind(ctx);
    ctx.ellipse=function(x,y,rx,ry,rot,a,b,c){try{return _el(_fin(x,0),_fin(y,0),_pos(rx),_pos(ry),_fin(rot,0),_fin(a,0),_fin(b,0),c);}catch(e){}};}
  const _crg=ctx.createRadialGradient.bind(ctx);
  ctx.createRadialGradient=function(x0,y0,r0,x1,y1,r1){
    try{return _crg(_fin(x0,0),_fin(y0,0),_pos(r0),_fin(x1,0),_fin(y1,0),Math.max(_pos(r1),_pos(r0)+0.01));}
    catch(e){return _crg(0,0,0,0,0,1);}
  };
  const _clg=ctx.createLinearGradient.bind(ctx);
  ctx.createLinearGradient=function(x0,y0,x1,y1){try{return _clg(_fin(x0,0),_fin(y0,0),_fin(x1,0),_fin(y1,0));}catch(e){return _crg(0,0,0,0,0,1);}};
}
const WHITE='#F2F3F5';
// Флаг тач-устройства — объявлен в начале, используется для мобильных настроек (скорость, ярлыки, радиус тапа)
const IS_TOUCH=('ontouchstart' in window)||navigator.maxTouchPoints>0;
let W,H,DPR,cx,cy,MIN;
function resize(){
DPR=Math.min(window.devicePixelRatio||1,2);
W=window.innerWidth;
// В мобильных WebView (Telegram/WhatsApp) innerHeight скачет из-за адресной строки — берём максимально доступную высоту
H=Math.max(window.innerHeight, (window.visualViewport&&window.visualViewport.height)||0, document.documentElement.clientHeight||0);
canvas.width=W*DPR;canvas.height=H*DPR;
canvas.style.width=W+'px';canvas.style.height=H+'px';
ctx.setTransform(DPR,0,0,DPR,0,0);
cx=W/2;cy=H/2;MIN=Math.min(W,H);
window.__grid=null; // пересчитать сетку-созвездие под новый размер
}
resize();
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>{resize();setTimeout(resize,300);});
if(window.visualViewport)window.visualViewport.addEventListener('resize',resize);
/* ---------- ПЛАНЕТЫ (12) — планетарные орбиты ---------- */
const NAMES=[
'Усиление отделов продаж','Панель управления для РОПов','Бот-помощник','Блог о продажах в Threads',
'Библиотека кейсов','Партнёрская программа','Компании-партнёры','Ассоциация системных продаж',
'Платформа участников ассоциации','Книга «Отдел продаж. Другой подход»','Библиотека отзывов','Библиотека аудитов',
'Инвестиционная программа'
];
/* ===== ССЫЛКИ РАЗДЕЛОВ — впиши сюда реальные URL (пока заглушки '#') ===== */
const LINKS={
  'Усиление отделов продаж':'https://vladiswork247365.github.io/op-usilenie/',
  'Панель управления для РОПов':'#',
  'Бот-помощник':'#',
  'Блог о продажах в Threads':'#',
  'Библиотека кейсов':'#',
  'Партнёрская программа':'#',
  'Компании-партнёры':'#',
  'Ассоциация системных продаж':'#',
  'Платформа участников ассоциации':'#',
  'Книга «Отдел продаж. Другой подход»':'#',
  'Библиотека отзывов':'#',
  'Библиотека аудитов':'#',
  'Инвестиционная программа':'#'
};
/* ===== ССЫЛКИ СОЦСЕТЕЙ — впиши сюда реальные URL (пока заглушки '#') =====
   WhatsApp: например 'https://wa.me/77001234567'
   Telegram: например 'https://t.me/your_username'                          */
const SOCIAL={
  whatsapp:'https://wa.me/77008880242?text=EcoSystemOp',
  telegram:'#'
};
/* ========================================================================= */
// СЕТЬ-СОЗВЕЗДИЕ: шары свободно дрейфуют, между близкими тянутся линии
const PLANETS=NAMES.map((name,i)=>({
name, link:LINKS[name]||'#',
baseSize:13+Math.random()*4,
size:0, maxSize:0,
x:0, y:0, vx:0, vy:0,
pulsePhase:Math.random()*Math.PI*2,
pulseSpeed:0.0009+Math.random()*0.0006
}));
// центр (лого) — зона, куда шары не залетают
let coreRadius=0;
function seed(){
PLANETS.forEach((p,i)=>{
if(IS_TOUCH){
// МОБИЛЬНЫЙ (FREE-PREMIUM): стартуем на домашних точках «ореола-овала», чтобы раскладка
// устаканивалась чисто (тот же закон, что и в updatePlanets).
const topSafe=(window.__safeTop||0), botSafe=(window.__safeBot||0);
const T=128+topSafe, B=H-96-botSafe;
const span=(B-T), cxv=cx;
const Rx=W*0.40, RxMin=W*0.135;
const fr=[0.10,0.30,0.50,0.685,0.87,1.0];
const xr=f=>RxMin+(Rx-RxMin)*Math.sin(f*Math.PI);
const pr=fr.map(f=>({y:T+span*f,dx:xr(f)}));
const sp=[
 [cxv,T],
 [cxv-pr[0].dx,pr[0].y],[cxv+pr[0].dx,pr[0].y],

ctx.beginPath();ctx.arc(p.x,p.y,glowR,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();
// ТЕЛО — глубокое полированное стекло (у неактивных — благородный серый)
const bg=ctx.createRadialGradient(p.x-sz*0.4,p.y-sz*0.45,sz*0.08,p.x+sz*0.25,p.y+sz*0.4,sz*1.3);
if(inactive){
bg.addColorStop(0,'#9aa0ab');
bg.addColorStop(0.25,'#6f7480');
bg.addColorStop(0.55,'#4a4e58');
bg.addColorStop(0.85,'#2a2c33');
bg.addColorStop(1,'#101114');
}else{
bg.addColorStop(0,'#ff4d66'); // тёплый красный отблик (без белого)
bg.addColorStop(0.25,'#e8203c');
bg.addColorStop(0.55,'#b00f24'); // насыщенный благородный красный
bg.addColorStop(0.85,'#5e0813');
bg.addColorStop(1,'#1c0207'); // глубокая тень — объём
}
ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
ctx.save();
ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.clip();
// внутренняя тень по нижнему краю (даёт стеклянную выпуклость)
const inner=ctx.createRadialGradient(p.x,p.y,sz*0.55,p.x,p.y,sz);
inner.addColorStop(0,'rgba(0,0,0,0)');inner.addColorStop(1,inactive?'rgba(8,9,12,0.55)':'rgba(20,2,6,0.55)');
ctx.fillStyle=inner;ctx.fillRect(p.x-sz,p.y-sz,sz*2,sz*2);
// отражённый свет снизу (rim light) — премиум
const rim=ctx.createRadialGradient(p.x+sz*0.35,p.y+sz*0.7,sz*0.05,p.x+sz*0.35,p.y+sz*0.7,sz*0.95);
if(inactive){rim.addColorStop(0,'rgba(160,165,175,0.35)');rim.addColorStop(1,'rgba(160,165,175,0)');}
else{rim.addColorStop(0,'rgba(224,40,60,0.5)');rim.addColorStop(1,'rgba(224,40,60,0)');}
ctx.fillStyle=rim;ctx.fillRect(p.x-sz,p.y-sz,sz*2,sz*2);
ctx.restore();
// тонкий светящийся ободок
ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);
ctx.strokeStyle=inactive?`rgba(190,195,205,${isHover?0.45:0.18})`:`rgba(255,140,155,${isHover?0.7:0.22})`;ctx.lineWidth=1;ctx.stroke();
// подпись — аккуратный капс с разрядкой. На мобильном нижние узлы подписываем НАД шаром,
// чтобы не было перекрытия с подсказкой/соседями (флаг _labelUp выставлен в updatePlanets).
const nodeR=(p.maxSize||sz);
let labelTop;
if(IS_TOUCH && p._labelUp){
  // считаем высоту подписи (1–2 строки по 10px), ставим её НАД шаром
  const lh=10, nameU=(p.name||'').toUpperCase();
  ctx.save();
  ctx.font=((isHover||isPanel)?'700 ':'500 ')+(isPanel?(IS_TOUCH?8.5:12):(IS_TOUCH?7.5:11))+"px 'Montserrat', sans-serif";
  const maxW=Math.min(120, W*0.34); let line='',lines=0;
  for(const w of nameU.split(' ')){const t=line?line+' '+w:w; if(ctx.measureText(t).width>maxW&&line){lines++;line=w;}else line=t;}
  if(line)lines++;
  ctx.restore();
  labelTop = p.y - nodeR - 6 - lines*lh;
}else{
  labelTop = p.y + nodeR + (IS_TOUCH?7:15);
}
ctx.textAlign='center';ctx.textBaseline='top';
// размер подписи: десктоп 11/12, мобильный мельче (7.5/8.5)
const fsBase=IS_TOUCH?7.5:11, fsPanel=IS_TOUCH?8.5:12;
ctx.font=((isHover||isPanel)?'700 ':'500 ')+(isPanel?fsPanel:fsBase)+"px 'Montserrat', sans-serif";
// неактивные — приглушённая серая подпись
ctx.fillStyle=inactive?((isHover||isPanel)?'rgba(200,205,213,0.78)':'rgba(150,155,165,0.5)')
                      :((isHover||isPanel)?'#FFFFFF':'rgba(238,240,243,0.85)');
ctx.shadowColor=isPanel?(inactive?'rgba(120,125,135,0.6)':'rgba(255,30,55,0.9)'):'rgba(0,0,0,0.95)';ctx.shadowBlur=isPanel?14:7;
const lw=wrapTextTop(p.name.toUpperCase(),p.x,labelTop,IS_TOUCH?10:15);
p.labelHalf=Math.max(p.labelHalf||0, lw/2); // запоминаем фактическую полуширину подписи
ctx.shadowBlur=0;
}
function drawCoreLogo(now){
const baseR=IS_TOUCH?Math.max(40,MIN*0.085):Math.max(70,MIN*0.13);
const pulse=1+0.11*Math.sin(now*0.0022); // выраженный синхронный пульс всего лого
const R=baseR*pulse;
const halo=ctx.createRadialGradient(cx,cy,0,cx,cy,R*2.4);
halo.addColorStop(0,`rgba(224,16,41,${0.5*pulse})`);halo.addColorStop(0.3,'rgba(224,16,41,0.16)');halo.addColorStop(1,'rgba(224,16,41,0)');
ctx.beginPath();ctx.arc(cx,cy,R*2.4,0,Math.PI*2);ctx.fillStyle=halo;ctx.fill();
const rot=now*0.0007,N=32;
for(let i=0;i<N;i++){
const a=(i/N)*Math.PI*2+rot,t=i/N;
const dotR=1.2+t*4.4;
const x=cx+Math.cos(a)*R,y=cy+Math.sin(a)*R;
const isRed=(Math.cos(a)>=-0.15);
ctx.beginPath();ctx.arc(x,y,dotR,0,Math.PI*2);
if(isRed){ctx.fillStyle='#E01029';ctx.shadowColor='rgba(224,16,41,0.8)';ctx.shadowBlur=8;}
else{ctx.fillStyle='#F2F3F5';ctx.shadowColor='rgba(255,255,255,0.4)';ctx.shadowBlur=5;}
ctx.fill();
}
ctx.shadowBlur=0;
ctx.textAlign='center';ctx.textBaseline='middle';
// надпись масштабируется ВМЕСТЕ с кольцом (тот же pulse)
const fs1=IS_TOUCH?Math.max(10,R*0.18):Math.max(13,R*0.2);
const fs2=IS_TOUCH?Math.max(13,R*0.27):Math.max(17,R*0.3);
ctx.shadowColor='rgba(224,16,41,0.5)';ctx.shadowBlur=6+6*((pulse-1)/0.11+1)/2;
ctx.font='800 '+fs1+"px 'Montserrat', sans-serif";ctx.fillStyle=WHITE;
ctx.fillText('ЭКОСИСТЕМА',cx,cy-fs2*0.36);
ctx.font='900 '+fs2+"px 'Montserrat', sans-serif";ctx.fillStyle='#E01029';
ctx.fillText('ОП',cx,cy+fs1*0.62);
ctx.shadowBlur=0;
}
function wrapText(text,x,y,lh){
const words=text.split(' ');let line='',lines=[];
for(const w of words){if((line+w).length>16&&line){lines.push(line.trim());line=w+' ';}else line+=w+' ';}
if(line)lines.push(line.trim());
const sy=y-(lines.length-1)*lh/2;
lines.forEach((l,i)=>ctx.fillText(l,x,sy+i*lh));
}
function wrapTextTop(text,x,top,lh){
// перенос по реальной ширине; на узком мобильном делаем уже, чтобы подпись не вылезала за край
const maxW=IS_TOUCH?Math.min(120, W*0.34):Math.min(150, W*0.4);
const words=text.split(' ');let line='',lines=[];
for(const w of words){
const test=line?line+' '+w:w;
if(ctx.measureText(test).width>maxW && line){lines.push(line);line=w;}
else line=test;
}
if(line)lines.push(line);
let widest=0;
lines.forEach(l=>{const lw=ctx.measureText(l).width;if(lw>widest)widest=lw;});
// прижимаем центр подписи внутрь экрана, чтобы длинная строка не уходила за край
let lx=x;
const half=widest/2, pad=10;
if(lx-half<pad)lx=pad+half;
if(lx+half>W-pad)lx=W-pad-half;
lines.forEach((l,i)=>{ctx.fillText(l,lx,top+i*lh);});
return widest; // фактическая ширина самой длинной строки подписи
}
/* ===== ПАНЕЛЬ-СПИСОК ===== */
try{(function(){
  const btn=document.getElementById('menuBtn');
  const panel=document.getElementById('panel');
  const overlay=document.getElementById('panelOverlay');
  const closeBtn=document.getElementById('panelClose');
  const list=document.getElementById('panelList');
  // строим список
  const arrow='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
  NAMES.forEach(name=>{
    const link=LINKS[name]||'#';
    const inactive=(link==='#');
    const row=document.createElement('div');row.className='p-item'+(inactive?' p-inactive':'');
    const nm=document.createElement('span');nm.className='p-name';nm.textContent=name;
    const go2=document.createElement('a');go2.className='p-go'+(inactive?' p-soon':'');
    go2.innerHTML=inactive?'Скоро':('Перейти'+arrow);
    go2.href=(link&&link!=='#')?link:'#';
    if(!inactive){go2.target='_blank';go2.rel='noopener';
      go2.addEventListener('click',e=>{e.preventDefault();close();go(name,link);});}
    else{go2.addEventListener('click',e=>e.preventDefault());}
    // подсветка соответствующего шара
    const planet=PLANETS.find(p=>p.name===name);
    const hi=()=>{if(planet){hoverPlanet=planet;panelHover=planet;}};
    const un=()=>{if(panelHover===planet){panelHover=null;}if(hoverPlanet===planet){hoverPlanet=null;}};
    row.addEventListener('mouseenter',hi);
    row.addEventListener('mouseleave',un);
    // на тач-устройствах нет hover → подсвечиваем при касании строки
    row.addEventListener('touchstart',hi,{passive:true});
    row.appendChild(nm);row.appendChild(go2);list.appendChild(row);
  });
  function open(){panel.classList.add('open');overlay.classList.add('show');btn.classList.add('open');}
  function close(){panel.classList.remove('open');overlay.classList.remove('show');btn.classList.remove('open');}
  function toggle(){panel.classList.contains('open')?close():open();}
  // Тач и клик не должны конфликтовать: если был touch, гасим последующий синтетический click
  let _touched=false;
  function markTouch(){_touched=true;setTimeout(()=>{_touched=false;},500);}
  btn.addEventListener('click',()=>{if(_touched)return;toggle();});
  closeBtn.addEventListener('click',()=>{if(_touched)return;close();});
  overlay.addEventListener('click',()=>{if(_touched)return;close();});
  btn.addEventListener('touchend',e=>{e.preventDefault();markTouch();toggle();},{passive:false});
  closeBtn.addEventListener('touchend',e=>{e.preventDefault();markTouch();close();},{passive:false});
  overlay.addEventListener('touchend',e=>{e.preventDefault();markTouch();close();},{passive:false});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')close();});

  // ===== Геймификация (десктоп): наведение на центральное лого открывает панель =====
  if(!IS_TOUCH){
    let hoverOpened=false;     // панель открыта именно ховером (а не кнопкой)
    let overPanel=false;
    panel.addEventListener('mouseenter',()=>{overPanel=true;});
    panel.addEventListener('mouseleave',()=>{overPanel=false;});
    document.addEventListener('mousemove',e=>{
      if(typeof cx==='undefined'||typeof coreRadius==='undefined'||!coreRadius)return;
      const d=Math.hypot(e.clientX-cx,e.clientY-cy);
      if(d<coreRadius+40){
        if(!panel.classList.contains('open')){open();hoverOpened=true;}
      }else if(hoverOpened && d>coreRadius+170 && !overPanel){
        close();hoverOpened=false;
      }
      if(!panel.classList.contains('open'))hoverOpened=false;
    });
  }

  // ===== Привязка кнопок соцсетей =====
  function wireSocial(id,url,label){
    const el=document.getElementById(id);
    if(!el)return;
    if(url&&url!=='#'){el.href=url;el.target='_blank';el.rel='noopener';}
    else{
      el.href='#';
      el.addEventListener('click',e=>{e.preventDefault();alert(label+': вставьте ссылку в объект SOCIAL');});
    }
  }
  wireSocial('waTop',SOCIAL.whatsapp,'WhatsApp');
  wireSocial('waPanel',SOCIAL.whatsapp,'WhatsApp');
})();}catch(e){}

try{resize();}catch(e){}
try{coreRadius=IS_TOUCH?Math.max(46,MIN*0.115):Math.max(70,MIN*0.13);}catch(e){}
try{seed();}catch(e){}
try{requestAnimationFrame(frame);}catch(e){}
setTimeout(()=>{var el=document.getElementById('intro');if(el)el.classList.add('hide');},900);}
